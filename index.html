<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreakMate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 420px;
        }
        .flame { margin-bottom: 24px; }
        .flame img { width: 80px; height: 80px; border-radius: 18px; }
        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 17px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .cta {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B35, #E8451C);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 14px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .cta:hover { opacity: 0.9; }
        .invite-notice {
            margin-top: 24px;
            padding: 16px 20px;
            background: #FFF5F0;
            border-radius: 12px;
            font-size: 15px;
            color: #E8451C;
            line-height: 1.4;
            display: none;
        }
        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: #999;
        }
        .footer a { color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="flame"><img src="/icon.png" alt="StreakMate"></div>
        <h1>StreakMate</h1>
        <p class="tagline">One habit. Two people. One shared streak.<br>Hold each other accountable, anywhere in the world.</p>

        <div id="invite-notice" class="invite-notice">
            You've been invited to join a streak!<br>
            Download StreakMate to accept.
        </div>

        <a href="#" class="cta" id="download-btn">Download on the App Store</a>

        <div class="footer">
            <a href="/privacy">Privacy Policy</a> &middot; <a href="/terms">Terms of Service</a>
        </div>
    </div>

    <script>
        // Check if this is an invite link
        if (window.location.pathname.startsWith('/invite/')) {
            document.getElementById('invite-notice').style.display = 'block';

            // Try to open the app via custom scheme as fallback
            var token = window.location.pathname.split('/invite/')[1];
            if (token) {
                window.location.href = 'streakmate://invite/' + token;
            }
        }
    </script>
</body>
</html>
