<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join my streak on StreakMate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 420px;
        }
        .flame { font-size: 64px; margin-bottom: 24px; }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 17px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .cta {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B35, #E8451C);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: 14px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .cta:hover { opacity: 0.9; }
        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }
        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: #999;
        }
        .footer a { color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="flame">🔥</div>
        <h1>You've been invited!</h1>
        <p class="subtitle">Someone wants to start a streak with you on StreakMate. Download the app to accept and start holding each other accountable.</p>

        <a href="#" class="cta" id="download-btn">Get StreakMate</a>

        <p class="note">The app will open automatically if you already have it installed.</p>

        <div class="footer">
            <a href="/privacy">Privacy</a> &middot; <a href="/terms">Terms</a>
        </div>
    </div>

    <script>
        // Try custom scheme fallback for devices with app installed
        var path = window.location.pathname;
        var parts = path.split('/invite/');
        if (parts.length > 1 && parts[1]) {
            setTimeout(function() {
                window.location.href = 'streakmate://invite/' + parts[1];
            }, 500);
        }
    </script>
</body>
</html>
